name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (node:test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: npm test
